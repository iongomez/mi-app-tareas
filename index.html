<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Block</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="loginOverlay">
    <div class="login-card">
      <span class="login-logo">Focus Block</span>
      <p class="login-tagline">Organiza tu día. Mantén el foco.</p>
      <button class="btn-google" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>
    </div>
  </div>

  <div class="app" id="appRoot" hidden>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-name">Focus Block</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" id="navInbox" href="#">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
          </span>
          Inbox
        </a>
        <a class="nav-item" id="navToday" href="#">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/></svg>
          </span>
          Hoy
        </a>
        <a class="nav-item" id="navPlanned" href="#">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </span>
          Planificadas
        </a>
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-user" id="sidebarUserSection">
          <div class="user-avatar" id="sidebarUserAvatar">IG</div>
          <span class="sidebar-user-name" id="sidebarUserName">Ion Gomez</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">

      <!-- Dashboard Grid -->
      <div class="dashboard-grid">

        <!-- Calendar Widget -->
        <div class="widget widget-calendar">
          <div class="widget-header">
            <span class="widget-title-text" id="calTitle">Marzo 2026</span>
            <div class="cal-nav">
              <button class="cal-btn" id="calPrev">&#8249;</button>
              <button class="cal-btn" id="calNext">&#8250;</button>
            </div>
          </div>
          <div class="calendar" id="calendar"></div>
        </div>

        <!-- Tasks Widget -->
        <div class="widget widget-tasks">
          <div class="widget-header">
            <div class="widget-title-group">
              <span class="widget-title-text" id="widgetTitle">Inbox</span>
              <span class="task-count-badge" id="taskCountBadge">(0)</span>
            </div>
            <div class="more-wrapper">
              <button class="icon-btn" id="moreBtn" aria-label="Más opciones" aria-expanded="false">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
              </button>
              <div class="task-menu" id="taskMenu" hidden>
                <button class="task-menu-item" id="menuAddTask">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Agregar tarea
                </button>
                <div class="task-menu-divider"></div>
                <button class="task-menu-item task-menu-item--danger" id="menuClearCompleted">Eliminar completadas</button>
                <button class="task-menu-item task-menu-item--danger" id="menuClearAll">Limpiar todo</button>
              </div>
            </div>
          </div>
          <p class="tasks-subtitle" id="subtitle">0 tareas pendientes</p>
          <ul class="task-list" id="taskList"></ul>
          <div class="task-form-wrapper">
            <form class="task-form" id="taskForm">
              <input
                type="text"
                id="taskInput"
                placeholder="Agregar tarea..."
                autocomplete="off"
              >
              <button type="submit" class="task-add-btn" id="taskAddBtn" disabled>Agregar</button>
            </form>
          </div>
        </div>

        <!-- Events Widget -->
        <div class="widget widget-events">
          <div class="widget-header">
            <span class="widget-title-text">Planificadas</span>
          </div>
          <div id="upcomingList"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script src="app.js"></script>
</body>
</html>
