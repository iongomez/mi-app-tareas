<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-avatar">IG</div>
          <span class="logo-name">Organizo</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.5" fill="currentColor"/><rect x="10" y="1.5" width="5.5" height="5.5" rx="1.5" fill="currentColor"/><rect x="1.5" y="10" width="5.5" height="5.5" rx="1.5" fill="currentColor"/><rect x="10" y="10" width="5.5" height="5.5" rx="1.5" fill="currentColor"/></svg>
          </span>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><circle cx="8.5" cy="8.5" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 8.5L7.5 10.5L11.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span>Mis tareas</span>
        </a>
        <a href="#" class="nav-item">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M8.5 2.5C6.3 2.5 4.5 4.3 4.5 6.5V10.5L3 12H14L12.5 10.5V6.5C12.5 4.3 10.7 2.5 8.5 2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 12.5C7 13.33 7.67 14 8.5 14C9.33 14 10 13.33 10 12.5" stroke="currentColor" stroke-width="1.5"/></svg>
          </span>
          <span>Notificaciones</span>
        </a>
      </nav>

      <div class="sidebar-bottom">
        <a href="#" class="nav-item">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><circle cx="8.5" cy="8.5" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M8.5 1.5v1.5M8.5 14v1.5M1.5 8.5H3M14 8.5h1.5M3.4 3.4l1.06 1.06M12.54 12.54l1.06 1.06M3.4 13.6l1.06-1.06M12.54 4.46l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </span>
          <span>Configuración</span>
        </a>
        <a href="#" class="nav-item">
          <span class="nav-icon">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M6 3H3.5C2.95 3 2.5 3.45 2.5 4V13C2.5 13.55 2.95 14 3.5 14H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 5.5L14.5 8.5L11 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 8.5H14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <span>Cerrar sesión</span>
        </a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <div class="search-wrapper">
          <span class="search-icon">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#8A8A8A" stroke-width="1.5"/><path d="M10.5 10.5L13.5 13.5" stroke="#8A8A8A" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <input type="text" class="search-input" placeholder="Buscar...">
        </div>
        <div class="topbar-actions">
          <button id="btnNewTask" class="btn-new-task">+ Nueva tarea</button>
          <div class="topbar-icon-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="#1A1A1A" stroke-width="1.4"/><path d="M1.5 5.5L8 9L14.5 5.5" stroke="#1A1A1A" stroke-width="1.4"/></svg>
          </div>
          <div class="user-avatar">IG</div>
        </div>
      </div>

      <div class="dashboard-grid">

        <!-- Calendar -->
        <div class="widget widget-calendar">
          <div class="widget-header">
            <span id="calTitle" class="widget-title-text">Marzo 2026</span>
            <div class="cal-nav">
              <button id="calPrev" class="cal-btn">&#8249;</button>
              <button id="calNext" class="cal-btn">&#8250;</button>
            </div>
          </div>
          <div id="calendar" class="calendar"></div>
        </div>

        <!-- My Tasks -->
        <div class="widget widget-tasks">
          <div class="widget-header">
            <div class="widget-title-group">
              <h3 class="widget-title-text">Mis tareas</h3>
              <span id="taskCountBadge" class="task-count-badge">(0)</span>
            </div>
            <button class="icon-btn more-btn" aria-label="Más opciones">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="3" cy="8" r="1.5" fill="#8A8A8A"/><circle cx="8" cy="8" r="1.5" fill="#8A8A8A"/><circle cx="13" cy="8" r="1.5" fill="#8A8A8A"/></svg>
            </button>
          </div>
          <p id="subtitle" class="tasks-subtitle">0 tareas pendientes</p>
          <ul id="taskList" class="task-list"></ul>
          <div class="task-form-wrapper">
            <form id="taskForm" class="task-form">
              <input
                type="text"
                id="taskInput"
                placeholder="+ Agregar nueva tarea..."
                autocomplete="off"
              >
            </form>
          </div>
        </div>

        <!-- Proximos eventos -->
        <div class="widget widget-events">
          <div class="widget-header">
            <h3 class="widget-title-text">Próximos eventos</h3>
          </div>
          <div class="empty-widget">
            <span class="empty-widget-icon">&#128197;</span>
            <strong class="empty-widget-title">Sin eventos próximos</strong>
            <span class="empty-widget-desc">Próximamente podrás ver tus<br>eventos aquí</span>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
